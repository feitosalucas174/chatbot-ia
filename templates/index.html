<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aria — Assistente IA</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Dark theme */
      --bg:             #212121;
      --sidebar-bg:     #171717;
      --surface:        #2f2f2f;
      --surface-2:      #3a3a3a;
      --border:         rgba(255,255,255,.08);
      --text:           #ececec;
      --text-2:         #8e8ea0;
      --text-3:         #555568;
      --user-row-bg:    rgba(255,255,255,.03);
      --accent:         #a855f7;
      --accent-hover:   #9333ea;
      --accent-glow:    rgba(168,85,247,.2);
      --code-bg:        #0d0d1a;
      --code-border:    #1e1e3a;
      --input-bg:       #2f2f2f;
      --input-border:   rgba(255,255,255,.12);
      --scrollbar:      #333;

      --sidebar-w: 260px;
      --max-w:     740px;
      --radius:    12px;
      --radius-lg: 16px;
      --font:      'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --mono:      'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      --ease:      .18s ease;
    }

    [data-theme="light"] {
      --bg:            #ffffff;
      --sidebar-bg:    #f7f7f8;
      --surface:       #efefef;
      --surface-2:     #e4e4e4;
      --border:        rgba(0,0,0,.07);
      --text:          #111111;
      --text-2:        #6e6e80;
      --text-3:        #9999aa;
      --user-row-bg:   rgba(0,0,0,.025);
      --accent:        #7c3aed;
      --accent-hover:  #6d28d9;
      --accent-glow:   rgba(124,58,237,.15);
      --code-bg:       #13131f;
      --code-border:   #252538;
      --input-bg:      #f0f0f0;
      --input-border:  rgba(0,0,0,.1);
      --scrollbar:     #ccc;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      transition: background var(--ease), color var(--ease);
    }

    /* ─── SIDEBAR ─────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform var(--ease);
      z-index: 200;
    }

    .sidebar-top {
      padding: 14px 12px 10px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 4px 12px;
    }

    .brand-icon {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #a855f7, #6d28d9);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(168,85,247,.35);
    }

    .brand-name {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -.3px;
      color: var(--text);
    }

    .brand-tag {
      font-size: .65rem;
      color: var(--text-3);
      margin-top: 1px;
    }

    .btn-new {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: .85rem;
      font-weight: 500;
      padding: 9px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background var(--ease);
    }

    .btn-new:hover { background: var(--surface-2); }

    .sidebar-section {
      font-size: .68rem;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 14px 14px 4px;
    }

    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 2px 6px;
    }

    .conv-list::-webkit-scrollbar { width: 3px; }
    .conv-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

    .conv-item {
      padding: 6px 8px;
      border-radius: 8px;
      font-size: .82rem;
      color: var(--text-2);
      cursor: pointer;
      transition: background var(--ease), color var(--ease);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .conv-item::before {
      content: '💬';
      font-size: .72rem;
      flex-shrink: 0;
      opacity: .6;
    }

    .conv-item-title {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .conv-del {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: transparent;
      border: none;
      color: var(--text-3);
      font-size: 13px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background var(--ease), color var(--ease);
      padding: 0;
    }

    .conv-item:hover .conv-del,
    .conv-item.active .conv-del { display: flex; }

    .conv-del:hover {
      background: rgba(239,68,68,.15);
      color: #f87171;
    }

    .conv-item:hover, .conv-item.active {
      background: var(--surface);
      color: var(--text);
    }

    .conv-empty {
      padding: 20px 14px;
      font-size: .8rem;
      color: var(--text-3);
      text-align: center;
    }

    .sidebar-footer {
      padding: 10px 6px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-action {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: .82rem;
      color: var(--text-2);
      cursor: pointer;
      background: transparent;
      border: none;
      font-family: var(--font);
      width: 100%;
      text-align: left;
      transition: background var(--ease), color var(--ease);
    }

    .sidebar-action:hover { background: var(--surface); color: var(--text); }

    /* ─── MAIN ────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Mobile topbar */
    .topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .topbar-title {
      font-weight: 700;
      font-size: .95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-icon {
      background: transparent;
      border: none;
      color: var(--text-2);
      cursor: pointer;
      font-size: 18px;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--ease), color var(--ease);
    }

    .btn-icon:hover { background: var(--surface); color: var(--text); }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    /* Welcome */
    .welcome {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 80px;
      text-align: center;
    }

    .welcome-logo {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, #a855f7, #6d28d9);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: white;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(168,85,247,.35);
    }

    .welcome h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -.6px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-sub {
      color: var(--text-2);
      font-size: .95rem;
      max-width: 400px;
      line-height: 1.65;
      margin-bottom: 36px;
    }

    .sug-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 580px;
      width: 100%;
    }

    .sug-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      transition: background var(--ease), border-color var(--ease), transform var(--ease);
    }

    .sug-card:hover {
      background: var(--surface-2);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .sug-icon { font-size: 1.3rem; margin-bottom: 7px; }

    .sug-text {
      font-size: .82rem;
      color: var(--text-2);
      line-height: 1.45;
    }

    /* Message rows */
    .msg-row {
      padding: 22px 0;
      transition: background var(--ease);
      animation: msgIn .2s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { background: var(--user-row-bg); }

    .msg-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .msg-av {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .msg-av.aria {
      background: linear-gradient(135deg, #a855f7, #6d28d9);
      color: white;
      font-size: 16px;
      box-shadow: 0 2px 8px var(--accent-glow);
    }

    .msg-av.user-av {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: white;
      font-size: 14px;
    }

    .msg-content { flex: 1; min-width: 0; }

    .msg-label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    .msg-text {
      font-size: .95rem;
      line-height: 1.78;
      color: var(--text);
    }

    /* Markdown styles inside msg-text */
    .msg-text p { margin-bottom: .55rem; }
    .msg-text p:last-child { margin-bottom: 0; }
    .msg-text h1 { font-size: 1.35rem; font-weight: 700; margin: 1.1rem 0 .5rem; }
    .msg-text h2 { font-size: 1.15rem; font-weight: 700; margin: .9rem 0 .4rem; }
    .msg-text h3 { font-size: 1rem;    font-weight: 600; margin: .75rem 0 .3rem; }
    .msg-text h4 { font-size: .95rem;  font-weight: 600; margin: .6rem 0 .25rem; color: var(--text-2); }
    .msg-text ul, .msg-text ol { padding-left: 1.4rem; margin: .5rem 0; }
    .msg-text li { margin-bottom: .25rem; }
    .msg-text li::marker { color: var(--accent); }
    .msg-text strong { font-weight: 600; }
    .msg-text em { font-style: italic; }
    .msg-text hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .msg-text blockquote {
      border-left: 3px solid var(--accent);
      padding: .3rem 1rem;
      color: var(--text-2);
      margin: .5rem 0;
      font-style: italic;
    }
    .msg-text a { color: var(--accent); text-decoration: none; }
    .msg-text a:hover { text-decoration: underline; }

    .icode {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 1px 6px;
      font-family: var(--mono);
      font-size: .83em;
      color: #e879f9;
    }

    /* Code blocks */
    .cblock {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: var(--radius);
      margin: .75rem 0;
      overflow: hidden;
    }

    .cblock-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 14px;
      background: rgba(255,255,255,.04);
      border-bottom: 1px solid var(--code-border);
    }

    .cblock-lang {
      font-family: var(--mono);
      font-size: .7rem;
      color: #94a3b8;
      text-transform: lowercase;
      letter-spacing: .04em;
    }

    .cblock-dots { display: flex; gap: 5px; }
    .cblock-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .cblock-dot:nth-child(1) { background: #ff5f57; }
    .cblock-dot:nth-child(2) { background: #febc2e; }
    .cblock-dot:nth-child(3) { background: #28c840; }

    .copy-code {
      background: transparent;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 5px;
      color: #94a3b8;
      font-size: .72rem;
      padding: 2px 10px;
      cursor: pointer;
      font-family: var(--font);
      transition: all var(--ease);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .copy-code:hover { background: rgba(255,255,255,.08); color: #e2e8f0; }
    .copy-code.ok { color: #4ade80; border-color: #4ade80; }

    .cblock pre {
      padding: 14px 18px;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: .84rem;
      line-height: 1.65;
      color: #c9d1d9;
    }

    .cblock pre::-webkit-scrollbar { height: 4px; }
    .cblock pre::-webkit-scrollbar-thumb { background: var(--code-border); border-radius: 2px; }

    /* Typing indicator */
    .typing-row { padding: 22px 0; }

    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      height: 22px;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      background: var(--text-2);
      border-radius: 50%;
      animation: tBounce 1.1s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: .16s; }
    .typing-dots span:nth-child(3) { animation-delay: .32s; }

    @keyframes tBounce {
      0%, 55%, 100% { transform: translateY(0); opacity: .5; }
      27%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ─── INPUT ───────────────────────────── */
    .input-wrap {
      padding: 14px 20px 18px;
      background: var(--bg);
      flex-shrink: 0;
    }

    .input-box {
      max-width: var(--max-w);
      margin: 0 auto;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: flex-end;
      padding: 10px 10px 10px 16px;
      gap: 8px;
      transition: border-color var(--ease), box-shadow var(--ease);
    }

    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: .95rem;
      resize: none;
      max-height: 160px;
      line-height: 1.6;
    }

    #user-input::placeholder { color: var(--text-3); }

    .btn-send {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 9px;
      cursor: pointer;
      color: white;
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--ease), transform var(--ease), opacity var(--ease);
    }

    .btn-send:hover:not(:disabled) { background: var(--accent-hover); transform: scale(1.06); }
    .btn-send:disabled { opacity: .3; cursor: not-allowed; transform: none; }

    .input-hint {
      max-width: var(--max-w);
      margin: 7px auto 0;
      font-size: .7rem;
      color: var(--text-3);
      text-align: center;
    }

    /* ─── OVERLAY (mobile) ────────────────── */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 199;
    }

    #sidebar-overlay.on { display: block; }

    /* ─── RESPONSIVE ──────────────────────── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0;
        height: 100dvh;
        transform: translateX(-100%);
        box-shadow: none;
      }

      .sidebar.open {
        transform: translateX(0);
        box-shadow: 4px 0 32px rgba(0,0,0,.4);
      }

      .topbar { display: flex; }
      .sug-grid { grid-template-columns: 1fr; max-width: 320px; }
      .msg-inner { padding: 0 16px; }
      .input-wrap { padding: 10px 14px 14px; }
      .welcome h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<div id="sidebar-overlay"></div>

<!-- ─── SIDEBAR ──────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <div>
        <div class="brand-name">Aria</div>
        <div class="brand-tag">Assistente IA</div>
      </div>
    </div>
    <button class="btn-new" id="new-chat-btn">
      <span style="font-size:1.1rem;line-height:1">＋</span> Nova conversa
    </button>
  </div>

  <p class="sidebar-section">Conversas recentes</p>
  <div class="conv-list" id="conv-list"></div>

  <div class="sidebar-footer">
    <button class="sidebar-action" id="theme-toggle">
      <span id="theme-icon">☀️</span>
      <span id="theme-label">Tema claro</span>
    </button>
    <button class="sidebar-action" id="clear-btn">
      <span>🗑️</span> Limpar conversa
    </button>
  </div>
</aside>

<!-- ─── MAIN ─────────────────────────────────────────── -->
<div class="main">

  <!-- Mobile topbar -->
  <header class="topbar">
    <button class="btn-icon" id="menu-btn">☰</button>
    <div class="topbar-title">
      <span style="font-size:16px">✦</span> Aria
    </div>
    <button class="btn-icon" id="mobile-clear">🗑️</button>
  </header>

  <!-- Messages -->
  <div id="messages" role="log" aria-live="polite" aria-label="Conversa"></div>

  <!-- Input -->
  <div class="input-wrap">
    <div class="input-box">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Pergunte qualquer coisa…"
        aria-label="Digite sua mensagem"
      ></textarea>
      <button class="btn-send" id="send-btn" aria-label="Enviar" disabled>↑</button>
    </div>
    <p class="input-hint">Enter para enviar · Shift+Enter para nova linha · Aria pode cometer erros</p>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let history    = [];
let waiting    = false;
let currentId  = null;
let convs      = JSON.parse(localStorage.getItem('aria-convs') || '[]');

// Code registry for copy buttons (survives re-renders)
const codeMap  = new Map();
let   codeSeq  = 0;

// ── DOM ───────────────────────────────────────────────────────────────────────
const msgsEl       = document.getElementById('messages');
const inputEl      = document.getElementById('user-input');
const sendBtn      = document.getElementById('send-btn');
const newChatBtn   = document.getElementById('new-chat-btn');
const clearBtn     = document.getElementById('clear-btn');
const mobileClear  = document.getElementById('mobile-clear');
const themeToggle  = document.getElementById('theme-toggle');
const themeIcon    = document.getElementById('theme-icon');
const themeLabel   = document.getElementById('theme-label');
const convListEl   = document.getElementById('conv-list');
const sidebarEl    = document.getElementById('sidebar');
const overlayEl    = document.getElementById('sidebar-overlay');
const menuBtn      = document.getElementById('menu-btn');

// ── Theme ─────────────────────────────────────────────────────────────────────
const html = document.documentElement;

function setTheme(t) {
  html.setAttribute('data-theme', t);
  themeIcon.textContent  = t === 'dark' ? '☀️' : '🌙';
  themeLabel.textContent = t === 'dark' ? 'Tema claro' : 'Tema escuro';
  localStorage.setItem('aria-theme', t);
}

setTheme(localStorage.getItem('aria-theme') || 'dark');
themeToggle.addEventListener('click', () =>
  setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')
);

// ── Sidebar ───────────────────────────────────────────────────────────────────
menuBtn.addEventListener('click', openSidebar);
overlayEl.addEventListener('click', closeSidebar);

function openSidebar()  { sidebarEl.classList.add('open');  overlayEl.classList.add('on'); }
function closeSidebar() { sidebarEl.classList.remove('open'); overlayEl.classList.remove('on'); }

// ── Input resize ──────────────────────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  sendBtn.disabled = !inputEl.value.trim() || waiting;
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); }
});

sendBtn.addEventListener('click', send);
newChatBtn.addEventListener('click', newChat);
clearBtn.addEventListener('click', clearChat);
mobileClear.addEventListener('click', clearChat);

// ── Markdown renderer ─────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function md(raw) {
  // 1. Extract fenced code blocks
  const blocks = [];
  let t = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    blocks.push({ lang: lang.trim(), code: code.trim() });
    return `\x02BLOCK${blocks.length - 1}\x02`;
  });

  // 2. Inline formatter: escapes HTML then applies bold/italic/code
  function fmt(s) {
    s = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s = s.replace(/`([^`]+)`/g, '<code class="icode">$1</code>');
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g,       '<strong>$1</strong>');
    s = s.replace(/\*([^*\n]+)\*/g,   '<em>$1</em>');
    return s;
  }

  // 3. Block-level processing — empty lines are SKIPPED (CSS handles spacing)
  const lines = t.split('\n');
  let out = '';
  let i = 0;

  while (i < lines.length) {
    const raw_line = lines[i];
    const line = raw_line.trim();

    // Skip blank lines entirely
    if (line === '') { i++; continue; }

    // Code block placeholder
    if (/\x02BLOCK\d+\x02/.test(line)) {
      out += line;
      i++;
      continue;
    }

    // Setext headings: linha seguida de ===+ (h1) ou ---+ (h2)
    if (i + 1 < lines.length) {
      const next = lines[i + 1].trim();
      if (/^={2,}$/.test(next)) { out += `<h1>${fmt(line)}</h1>`; i += 2; continue; }
      if (/^-{2,}$/.test(next)) { out += `<h2>${fmt(line)}</h2>`; i += 2; continue; }
    }

    // Linhas decorativas soltas (===+ ou ---+) — ignorar
    if (/^[=]{2,}$/.test(line)) { i++; continue; }

    // ATX headings  # ## ### ####
    const h4 = line.match(/^#{4,} (.+)/);
    const h3 = line.match(/^### (.+)/);
    const h2 = line.match(/^## (.+)/);
    const h1 = line.match(/^# (.+)/);
    if (h4) { out += `<h4>${fmt(h4[1])}</h4>`; i++; continue; }
    if (h3) { out += `<h3>${fmt(h3[1])}</h3>`; i++; continue; }
    if (h2) { out += `<h2>${fmt(h2[1])}</h2>`; i++; continue; }
    if (h1) { out += `<h1>${fmt(h1[1])}</h1>`; i++; continue; }

    // HR  ---
    if (/^-{3,}$/.test(line)) { out += '<hr>'; i++; continue; }

    // Blockquote
    const bq = line.match(/^> (.+)/);
    if (bq) { out += `<blockquote>${fmt(bq[1])}</blockquote>`; i++; continue; }

    // Unordered list — consume all consecutive list items
    if (/^[-*+] /.test(line)) {
      out += '<ul>';
      while (i < lines.length && /^[-*+] /.test(lines[i].trim())) {
        out += `<li>${fmt(lines[i].trim().replace(/^[-*+] /, ''))}</li>`;
        i++;
      }
      out += '</ul>';
      continue;
    }

    // Ordered list — consume all consecutive list items
    if (/^\d+\. /.test(line)) {
      out += '<ol>';
      while (i < lines.length && /^\d+\. /.test(lines[i].trim())) {
        out += `<li>${fmt(lines[i].trim().replace(/^\d+\. /, ''))}</li>`;
        i++;
      }
      out += '</ol>';
      continue;
    }

    // Paragraph — consume consecutive "plain" lines into one <p>
    const pLines = [];
    while (i < lines.length) {
      const l = lines[i].trim();
      if (l === '') break;
      if (/^#{1,3} |^---+$|^[-*+] |^\d+\. |^> /.test(l) || /\x02BLOCK/.test(l)) break;
      pLines.push(fmt(l));
      i++;
    }
    if (pLines.length) out += `<p>${pLines.join('<br>')}</p>`;
  }

  // 4. Restore code blocks
  out = out.replace(/\x02BLOCK(\d+)\x02/g, (_, idx) => {
    const { lang, code } = blocks[+idx];
    const id = `cb_${codeSeq++}`;
    codeMap.set(id, code);
    const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="cblock">
      <div class="cblock-head">
        <div class="cblock-dots">
          <span class="cblock-dot"></span><span class="cblock-dot"></span><span class="cblock-dot"></span>
        </div>
        <span class="cblock-lang">${esc(lang) || 'código'}</span>
        <button class="copy-code" onclick="copyCode(this,'${id}')">📋 Copiar</button>
      </div>
      <pre><code>${escaped}</code></pre>
    </div>`;
  });

  return out;
}

function copyCode(btn, id) {
  const code = codeMap.get(id) || '';
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('ok');
    setTimeout(() => { btn.innerHTML = '📋 Copiar'; btn.classList.remove('ok'); }, 2000);
  }).catch(() => {
    btn.textContent = 'Erro';
    setTimeout(() => { btn.innerHTML = '📋 Copiar'; }, 2000);
  });
}

// ── Welcome ───────────────────────────────────────────────────────────────────
const SUGGESTIONS = [
  { icon: '📧', text: 'Escreva um e-mail pedindo aumento de salário' },
  { icon: '🧠', text: 'Explique inteligência artificial de forma simples' },
  { icon: '💪', text: 'Crie um plano de treino semanal para iniciantes' },
  { icon: '🌍', text: 'Melhores técnicas para aprender inglês rapidamente' },
  { icon: '📊', text: 'Como criar uma planilha de controle financeiro pessoal?' },
  { icon: '✍️', text: 'Escreva um poema sobre o pôr do sol no mar' },
];

function renderWelcome() {
  const cards = SUGGESTIONS.map((s, i) =>
    `<div class="sug-card" data-idx="${i}">
       <div class="sug-icon">${s.icon}</div>
       <div class="sug-text">${esc(s.text)}</div>
     </div>`
  ).join('');

  msgsEl.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-logo">✦</div>
      <h1>Como posso ajudar?</h1>
      <p class="welcome-sub">Sou a Aria, sua assistente de IA. Posso ajudar com perguntas, textos, código, análises, criatividade e muito mais.</p>
      <div class="sug-grid">${cards}</div>
    </div>`;

  msgsEl.querySelectorAll('.sug-card').forEach(card => {
    card.addEventListener('click', () => useSuggestion(SUGGESTIONS[+card.dataset.idx].text));
  });
}

// ── Append message ────────────────────────────────────────────────────────────
function appendMsg(role, content) {
  document.getElementById('welcome')?.remove();

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const isAria = role === 'bot';
  row.innerHTML = `
    <div class="msg-inner">
      <div class="msg-av ${isAria ? 'aria' : 'user-av'}">${isAria ? '✦' : 'U'}</div>
      <div class="msg-content">
        <div class="msg-label">${isAria ? 'Aria' : 'Você'}</div>
        <div class="msg-text">${isAria ? md(content) : esc(content).replace(/\n/g,'<br>')}</div>
      </div>
    </div>`;

  msgsEl.appendChild(row);
  msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' });
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing';
  row.innerHTML = `
    <div class="msg-inner">
      <div class="msg-av aria">✦</div>
      <div class="msg-content">
        <div class="msg-label">Aria</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  msgsEl.appendChild(row);
  msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' });
}

function hideTyping() { document.getElementById('typing')?.remove(); }

// ── Send ──────────────────────────────────────────────────────────────────────
async function send() {
  const text = inputEl.value.trim();
  if (!text || waiting) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  waiting = true;

  appendMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res  = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
    });
    const data = await res.json();
    hideTyping();

    const reply = data.response || 'Não consegui processar sua mensagem.';
    appendMsg('bot', reply);
    history.push({ role: 'assistant', content: reply });
    saveConv(text);

  } catch {
    hideTyping();
    appendMsg('bot', 'Erro de conexão. Verifique se o servidor está rodando e tente novamente.');
    history.pop();
  } finally {
    waiting = false;
    sendBtn.disabled = !inputEl.value.trim();
    inputEl.focus();
  }
}

// ── Conversations ─────────────────────────────────────────────────────────────
function saveConv(firstMsg) {
  if (currentId) return;
  currentId = Date.now().toString();
  const title = firstMsg.length > 42 ? firstMsg.slice(0, 42) + '…' : firstMsg;
  convs.unshift({ id: currentId, title });
  if (convs.length > 25) convs.pop();
  localStorage.setItem('aria-convs', JSON.stringify(convs));
  renderConvList();
}

function renderConvList() {
  if (!convs.length) {
    convListEl.innerHTML = '<p class="conv-empty">Nenhuma conversa ainda</p>';
    return;
  }
  convListEl.innerHTML = convs
    .map(c => `
      <div class="conv-item${c.id === currentId ? ' active' : ''}" data-id="${c.id}" title="${esc(c.title)}">
        <span class="conv-item-title">${esc(c.title)}</span>
        <button class="conv-del" title="Apagar conversa" data-id="${c.id}">✕</button>
      </div>`)
    .join('');

  convListEl.querySelectorAll('.conv-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      deleteConv(btn.dataset.id);
    });
  });
}

function deleteConv(id) {
  convs = convs.filter(c => c.id !== id);
  localStorage.setItem('aria-convs', JSON.stringify(convs));
  if (currentId === id) {
    history = [];
    currentId = null;
    renderWelcome();
  }
  renderConvList();
}

function newChat() {
  history = [];
  currentId = null;
  renderWelcome();
  renderConvList();
  closeSidebar();
  inputEl.focus();
}

function clearChat() {
  history = [];
  currentId = null;
  renderWelcome();
  renderConvList();
  inputEl.focus();
}

function useSuggestion(text) {
  inputEl.value = text;
  inputEl.dispatchEvent(new Event('input'));
  inputEl.focus();
  send();
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderWelcome();
renderConvList();
inputEl.focus();
</script>
</body>
</html>
